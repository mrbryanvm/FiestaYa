name: konekta_app
description: App para organizar eventos - Konekta
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  google_maps_flutter: ^2.5.0
  image_picker: ^1.0.4
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  http: ^0.13.6
  font_awesome_flutter: ^10.7.0
  firebase_auth: ^4.20.0
  firebase_core: ^2.32.0
  google_sign_in: ^6.1.4
  intl: ^0.19.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/google_logo.png
    - assets/images/
